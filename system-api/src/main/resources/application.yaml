server:
  port: 8081

spring:
  application:
    name: system-api

  datasource:
    url: jdbc:postgresql://localhost:5432/microservices-training
    username: postgres
    password: root123
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c

  # 🔥 disable zipkin
  zipkin:
    tracing:
      endpoint: ""

  observations:
    annotations:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

logging:
  pattern:
    level: "%5p [${spring.application.name},%mdc{traceId:-},%mdc{spanId:-}]"